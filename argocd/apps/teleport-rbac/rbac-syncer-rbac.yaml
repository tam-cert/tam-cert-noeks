# ServiceAccount, ClusterRole, and ClusterRoleBinding for the tctl sync Job.
# The Job needs permission to exec into the teleport-auth pod to run tctl create.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: teleport-rbac-syncer
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: teleport-rbac-syncer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: teleport-rbac-syncer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: teleport-rbac-syncer
subjects:
  - kind: ServiceAccount
    name: teleport-rbac-syncer
    namespace: argocd
