# PostSync Job: applies all Teleport RBAC resources via tctl create.
# Runs after ArgoCD syncs the ConfigMap containing the rendered RBAC YAMLs.
# Uses kubectl exec into the teleport-auth pod (distroless — no shell, tctl only).
#
# Lifecycle:
#   PreSync  → ServiceAccount + RBAC created (rbac-syncer-rbac.yaml)
#   Sync     → ConfigMap with RBAC files created (rbac-configmap.yaml)
#   PostSync → This Job mounts the ConfigMap, execs tctl create -f for each file
#   Cleanup  → Job deleted by ArgoCD after TTL (hook-delete-policy)
#
# Idempotency: volume/mount existence is checked before patching so the job
# is safe to re-run if a previous attempt crashed before cleanup.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: teleport-rbac-apply
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: teleport-rbac-syncer
      restartPolicy: OnFailure
      containers:
        - name: tctl-apply
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # ── Cleanup function — always runs on exit (success or failure) ──
              cleanup() {
                echo "=== Cleanup: removing rbac-sync volume/mount if present ==="
                MOUNT_IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
                  python3 -c "
              import json,sys
              d=json.load(sys.stdin)
              mounts=d['spec']['template']['spec']['containers'][0].get('volumeMounts',[])
              idxs=[str(i) for i,m in enumerate(mounts) if m['name']=='rbac-sync']
              print(idxs[0] if idxs else '')
              " 2>/dev/null)
                VOL_IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
                  python3 -c "
              import json,sys
              d=json.load(sys.stdin)
              vols=d['spec']['template']['spec'].get('volumes',[])
              idxs=[str(i) for i,v in enumerate(vols) if v['name']=='rbac-sync']
              print(idxs[0] if idxs else '')
              " 2>/dev/null)
                if [ -n "${MOUNT_IDX}" ] && [ -n "${VOL_IDX}" ]; then
                  kubectl patch deployment teleport-auth -n teleport --type=json -p="[
                    {\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${MOUNT_IDX}\"},
                    {\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${VOL_IDX}\"}
                  ]" && echo "Volume/mount removed." || echo "WARN: cleanup patch failed, may need manual removal."
                  kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s || true
                else
                  echo "No rbac-sync volume found — nothing to clean up."
                fi
              }
              trap cleanup EXIT

              # ── Idempotent volume patch ────────────────────────────────────
              echo "=== Finding Teleport auth pod ==="
              AUTH_POD=$(kubectl get pod -n teleport \
                -l app.kubernetes.io/component=auth \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Auth pod: ${AUTH_POD}"

              echo "=== Checking if rbac-sync volume already mounted ==="
              ALREADY_MOUNTED=$(kubectl get deployment teleport-auth -n teleport -o json | \
                python3 -c "
              import json,sys
              d=json.load(sys.stdin)
              vols=d['spec']['template']['spec'].get('volumes',[])
              print('yes' if any(v['name']=='rbac-sync' for v in vols) else 'no')
              " 2>/dev/null)

              if [ "${ALREADY_MOUNTED}" = "yes" ]; then
                echo "rbac-sync volume already present (leftover from prior run) — skipping patch."
              else
                echo "=== Patching auth deployment to mount RBAC ConfigMap ==="
                kubectl patch deployment teleport-auth -n teleport --type=json -p="[
                  {\"op\":\"add\",\"path\":\"/spec/template/spec/volumes/-\",
                   \"value\":{\"name\":\"rbac-sync\",\"configMap\":{\"name\":\"teleport-rbac-files\"}}},
                  {\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/-\",
                   \"value\":{\"name\":\"rbac-sync\",\"mountPath\":\"/tmp/rbac-sync\",\"readOnly\":true}}
                ]"
                echo "=== Waiting for auth rollout ==="
                kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
              fi

              AUTH_POD=$(kubectl get pod -n teleport \
                -l app.kubernetes.io/component=auth \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Auth pod after mount: ${AUTH_POD}"

              echo "=== Applying RBAC resources via tctl ==="
              for f in \
                login-rule-okta-team.yaml \
                role-base.yaml \
                role-kube-access.yaml \
                role-ssh-access.yaml \
                role-ssh-root-access.yaml \
                role-auto-approver.yaml \
                access-monitoring-rule-okta-ssh.yaml \
                role-okta-base.yaml \
                role-okta-kube.yaml \
                role-okta-ssh.yaml \
                role-okta-ssh-root.yaml \
                role-okta-reviewer.yaml \
                role-mcp-ollama-tools.yaml \
                inference-model.yaml \
                inference-policy.yaml \
                kube-cluster-label.yaml; do
                echo "--- Applying ${f} ---"
                kubectl exec -n teleport "${AUTH_POD}" -- \
                  tctl create -f "/tmp/rbac-sync/${f}" && echo "${f}: OK" \
                  || echo "${f}: WARN (may already exist)"
              done

              echo "--- Applying cluster-auth-preference.yaml ---"
              kubectl exec -n teleport "${AUTH_POD}" -- \
                tctl create --confirm -f "/tmp/rbac-sync/cluster-auth-preference.yaml" \
                && echo "cluster-auth-preference.yaml: OK" \
                || echo "cluster-auth-preference.yaml: WARN"

              echo "=== RBAC sync complete ==="
              # cleanup() runs automatically via trap EXIT
