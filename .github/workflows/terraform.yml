name: Terraform - K8s Cluster

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_WORKING_DIR: terraform
  TF_VERSION: 1.8.5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan') || 'apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    environment: ${{ (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && 'production' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=tam-cert-noeks/terraform.tfstate" \
            -backend-config="region=us-west-2" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="training_prefix=grant-tam" \
            -var="customer_ip=${{ secrets.CUSTOMER_IP }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="teleport_license=${{ secrets.TELEPORT_LICENSE }}" \
            -var="aws_oidc_role_arn=${{ secrets.AWS_OIDC_ARN }}" \
            -var="github_repo=https://raw.githubusercontent.com/${{ github.repository }}/main" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;
            const body = [
              '## Terraform Plan',
              `- Init:     \`${{ steps.init.outcome }}\``,
              `- Validate: \`${{ steps.validate.outcome }}\``,
              `- Plan:     \`${{ steps.plan.outcome }}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="training_prefix=grant-tam" \
            -var="customer_ip=${{ secrets.CUSTOMER_IP }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="teleport_license=${{ secrets.TELEPORT_LICENSE }}" \
            -var="aws_oidc_role_arn=${{ secrets.AWS_OIDC_ARN }}" \
            -var="github_repo=https://raw.githubusercontent.com/${{ github.repository }}/main"

      - name: Output cluster info
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform output

      - name: Save private key to artifact
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: |
          mkdir -p /tmp/keys
          terraform output -raw private_key_pem > /tmp/keys/grant-tam-key.pem
          chmod 600 /tmp/keys/grant-tam-key.pem

      - name: Write Teleport license to file
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: echo "${{ secrets.TELEPORT_LICENSE }}" > /tmp/license.pem

      - name: Upload private key artifact
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        uses: actions/upload-artifact@v4.6.0
        with:
          name: grant-tam-key
          path: /tmp/keys/grant-tam-key.pem
          retention-days: 1
