name: Deploy - K8s Cluster + Teleport RBAC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_WORKING_DIR: terraform
  TF_VERSION: 1.8.5
  TELEPORT_PROXY: "grant-tam-teleport.gvteleport.com:443"
  TELEPORT_BOT_TOKEN: "rbac-github-bot-token"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Plan: runs on every PR and push to main ──────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=tam-cert-noeks/terraform.tfstate" \
            -backend-config="region=us-west-2" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="training_prefix=grant-tam" \
            -var="customer_ip=${{ secrets.CUSTOMER_IP }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="teleport_license=${{ secrets.TELEPORT_LICENSE }}" \
            -var="aws_oidc_role_arn=${{ secrets.AWS_OIDC_ARN }}" \
            -var="okta_metadata_url=${{ secrets.OKTA_METADATA_URL }}" \
            -var="okta_groups_editor=${{ secrets.OKTA_GROUPS_EDITOR }}" \
            -var="okta_groups_access=${{ secrets.OKTA_GROUPS_ACCESS }}" \
            -var="github_repo=https://raw.githubusercontent.com/${{ github.repository }}/main" \
            -detailed-exitcode \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const statusIcon = exitCode === '0' ? '✅ No changes' : exitCode === '2' ? '⚠️ Changes detected' : '❌ Plan failed';

            const body = [
              '## Terraform Plan — ' + statusIcon,
              '',
              '| Step | Status |',
              '|------|--------|',
              `| Init | \`${{ steps.init.outcome }}\` |`,
              `| Validate | \`${{ steps.validate.outcome }}\` |`,
              `| Plan | \`${{ steps.plan.outcome }}\` |`,
              '',
              '> **Merging this PR will automatically trigger `terraform apply` + Teleport RBAC apply** via the `production` environment gate.',
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

  # ── Apply: infra + Teleport RBAC, triggered on merge to main ─────────────────
  # Gated by production environment approval.
  # Two phases:
  #   1. terraform apply   — provisions/updates all infrastructure
  #   2. teleport-rbac     — applies RBAC roles via Machine ID (tbot/tctl)
  #                          only runs if the cluster is reachable
  apply:
    name: Apply — Infrastructure + Teleport RBAC
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    environment: production

    permissions:
      id-token: write   # required for Machine ID GitHub OIDC join
      contents: read

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── Phase 1: Terraform ───────────────────────────────────────────────────

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=tam-cert-noeks/terraform.tfstate" \
            -backend-config="region=us-west-2" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output cluster info
        run: terraform output

      - name: Save SSH key artifact
        run: |
          mkdir -p /tmp/keys
          terraform output -raw private_key_pem > /tmp/keys/grant-tam-key.pem
          chmod 600 /tmp/keys/grant-tam-key.pem

      - name: Upload SSH key artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: grant-tam-key
          path: /tmp/keys/grant-tam-key.pem
          retention-days: 1

      # ── Phase 2: Teleport RBAC via Machine ID ────────────────────────────────
      # Authenticates using GitHub OIDC → tbot → short-lived X.509 cert.
      # Requires the Teleport cluster to be up and the rbac-github-bot-token
      # join token to exist (created by Ansible teleport-rbac bootstrap step).
      # This step is skipped with a warning if the cluster is not yet reachable
      # (e.g. first apply before cloud-init has completed).

      - name: Install Teleport
        uses: teleport-actions/setup@v1
        with:
          version: 18.7.1

      - name: Check Teleport cluster reachability
        id: check_teleport
        run: |
          if curl -sf --max-time 10 \
            "https://${{ env.TELEPORT_PROXY }}/v1/webapi/ping" > /dev/null 2>&1; then
            echo "reachable=true" >> $GITHUB_OUTPUT
            echo "Teleport cluster is reachable — proceeding with RBAC apply"
          else
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "::warning::Teleport cluster not yet reachable — RBAC apply skipped. Re-run this workflow once the cluster is up."
          fi
        working-directory: .

      - name: Authenticate with Teleport Machine ID
        if: steps.check_teleport.outputs.reachable == 'true'
        uses: teleport-actions/auth@v2
        with:
          proxy: ${{ env.TELEPORT_PROXY }}
          token: ${{ env.TELEPORT_BOT_TOKEN }}
          credential-ttl: 10m
          anonymous-telemetry: 0

      - name: Install jinja2-cli
        if: steps.check_teleport.outputs.reachable == 'true'
        run: pip install jinja2-cli
        working-directory: .

      - name: Render RBAC templates
        if: steps.check_teleport.outputs.reachable == 'true'
        env:
          OKTA_METADATA_URL: ${{ secrets.OKTA_METADATA_URL }}
          OKTA_GROUPS_EDITOR: ${{ secrets.OKTA_GROUPS_EDITOR }}
          OKTA_GROUPS_ACCESS:  ${{ secrets.OKTA_GROUPS_ACCESS }}
          TELEPORT_DOMAIN: "grant-tam-teleport.gvteleport.com"
        run: |
          mkdir -p /tmp/rbac-rendered

          render() {
            jinja2 "$1" \
              -D teleport_domain="${TELEPORT_DOMAIN}" \
              -D okta_metadata_url="${OKTA_METADATA_URL}" \
              -D okta_groups_editor="${OKTA_GROUPS_EDITOR}" \
              -D okta_groups_access="${OKTA_GROUPS_ACCESS}" \
              -o "$2"
          }

          render ansible/roles/teleport-rbac/templates/login-rule-okta-team.yaml.j2    /tmp/rbac-rendered/login-rule-okta-team.yaml
          render ansible/roles/teleport-rbac/templates/role-base.yaml.j2               /tmp/rbac-rendered/role-base.yaml
          render ansible/roles/teleport-rbac/templates/role-kube-access.yaml.j2        /tmp/rbac-rendered/role-kube-access.yaml
          render ansible/roles/teleport-rbac/templates/role-ssh-access.yaml.j2         /tmp/rbac-rendered/role-ssh-access.yaml
          render ansible/roles/teleport-rbac/templates/role-ssh-root-access.yaml.j2    /tmp/rbac-rendered/role-ssh-root-access.yaml
          render ansible/roles/teleport-rbac/templates/role-auto-approver.yaml.j2      /tmp/rbac-rendered/role-auto-approver.yaml
          render ansible/roles/teleport-rbac/templates/saml-okta-patch.yaml.j2         /tmp/rbac-rendered/saml-okta-patch.yaml
          render ansible/roles/teleport-rbac/templates/cluster_auth_preference.yaml.j2 /tmp/rbac-rendered/cluster-auth-preference.yaml
        working-directory: .

      - name: Apply Teleport RBAC resources
        if: steps.check_teleport.outputs.reachable == 'true'
        run: |
          tctl create -f /tmp/rbac-rendered/login-rule-okta-team.yaml
          tctl create -f /tmp/rbac-rendered/role-base.yaml
          tctl create -f /tmp/rbac-rendered/role-kube-access.yaml
          tctl create -f /tmp/rbac-rendered/role-ssh-access.yaml
          tctl create -f /tmp/rbac-rendered/role-ssh-root-access.yaml
          tctl create -f /tmp/rbac-rendered/role-auto-approver.yaml
          tctl create -f /tmp/rbac-rendered/saml-okta-patch.yaml
          tctl create -f /tmp/rbac-rendered/cluster-auth-preference.yaml
        working-directory: .

      - name: Verify Teleport RBAC resources
        if: steps.check_teleport.outputs.reachable == 'true'
        run: |
          echo "=== Roles ==="
          tctl get roles/base roles/kube-access roles/ssh-access roles/ssh-root-access roles/auto-approver roles/rbac-manager
          echo "=== Login Rules ==="
          tctl get login_rule/okta-team-trait
          echo "=== SAML Connector ==="
          tctl get saml/okta
          echo "=== Cluster Auth Preference ==="
          tctl get cluster_auth_preference
        working-directory: .

  # ── Destroy: manual only, always gated by production environment ─────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=tam-cert-noeks/terraform.tfstate" \
            -backend-config="region=us-west-2" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="training_prefix=grant-tam" \
            -var="customer_ip=${{ secrets.CUSTOMER_IP }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="teleport_license=${{ secrets.TELEPORT_LICENSE }}" \
            -var="aws_oidc_role_arn=${{ secrets.AWS_OIDC_ARN }}" \
            -var="okta_metadata_url=${{ secrets.OKTA_METADATA_URL }}" \
            -var="okta_groups_editor=${{ secrets.OKTA_GROUPS_EDITOR }}" \
            -var="okta_groups_access=${{ secrets.OKTA_GROUPS_ACCESS }}" \
            -var="github_repo=https://raw.githubusercontent.com/${{ github.repository }}/main"
