apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: postgres
data:
  postgresql.conf: |
    listen_addresses = '*'
    port = 5432
    max_connections = 20
    shared_buffers = 128MB
    temp_buffers = 8MB
    work_mem = 4MB

    wal_level = logical
    max_replication_slots = 10

    ssl = on
    ssl_ca_file = '/certs/ca.crt'
    ssl_cert_file = '/certs/server.crt'
    ssl_key_file = '/certs/server.key'
