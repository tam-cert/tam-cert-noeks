# ─── postgres-certs-job.yaml ──────────────────────────────────────────────────
# One-shot Job that generates a self-signed CA and three certificate pairs:
#   server — used by the postgres pod (server.crt / server.key)
#   client — used by Teleport to authenticate as the 'teleport' user (client.crt / client.key)
#
# All certs are stored in the 'postgres-certs' Secret in the postgres namespace.
# The CN of the client cert must match the PostgreSQL username ('teleport')
# for cert auth (pg_hba.conf: cert clientcert=verify-full) to work.
#
# The Job is idempotent — it checks if the Secret already exists before
# generating new certs, so re-applying is safe.
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-cert-gen
  namespace: postgres
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: postgres-cert-gen
      containers:
        - name: cert-gen
          image: alpine/openssl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              # Skip if secret already exists (idempotent)
              if kubectl get secret postgres-certs -n postgres >/dev/null 2>&1; then
                echo "Secret postgres-certs already exists — skipping cert generation"
                exit 0
              fi

              cd /tmp

              # ── CA ──────────────────────────────────────────────────────────
              openssl genrsa -out ca.key 4096
              openssl req -new -x509 -days 3650 -key ca.key -out ca.crt \
                -subj "/CN=postgres-ca/O=teleport"

              # ── Server cert ─────────────────────────────────────────────────
              openssl genrsa -out server.key 4096
              openssl req -new -key server.key -out server.csr \
                -subj "/CN=postgres-service.postgres.svc.cluster.local/O=teleport"
              openssl x509 -req -days 3650 -in server.csr \
                -CA ca.crt -CAkey ca.key -CAcreateserial \
                -out server.crt \
                -extfile <(printf "subjectAltName=DNS:postgres-service.postgres.svc.cluster.local,DNS:postgres-service,DNS:localhost")

              # ── Client cert (CN must match PostgreSQL username 'teleport') ──
              openssl genrsa -out client.key 4096
              openssl req -new -key client.key -out client.csr \
                -subj "/CN=teleport/O=teleport"
              openssl x509 -req -days 3650 -in client.csr \
                -CA ca.crt -CAkey ca.key -CAcreateserial \
                -out client.crt

              # Fix permissions — postgres requires server key to be 0600
              chmod 600 server.key client.key

              # ── Store in Secret ─────────────────────────────────────────────
              kubectl create secret generic postgres-certs \
                -n postgres \
                --from-file=ca.crt=ca.crt \
                --from-file=server.crt=server.crt \
                --from-file=server.key=server.key \
                --from-file=client.crt=client.crt \
                --from-file=client.key=client.key

              echo "postgres-certs Secret created successfully"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-cert-gen
  namespace: postgres
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-cert-gen
  namespace: postgres
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-cert-gen
  namespace: postgres
subjects:
  - kind: ServiceAccount
    name: postgres-cert-gen
    namespace: postgres
roleRef:
  kind: Role
  name: postgres-cert-gen
  apiGroup: rbac.authorization.k8s.io
