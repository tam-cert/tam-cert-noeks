apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-hba-config
  namespace: postgres
data:
  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS         METHOD

    # Local connections (used by postgres process itself)
    local   all             all                             trust

    # Allow admin user login with password (bootstrap/maintenance)
    host    all             postgres        127.0.0.1/32    md5
    host    all             postgres        ::1/128         md5

    # Require client certificate for the teleport user from anywhere
    # This enforces mutual TLS — Teleport must present a cert signed by our CA
    hostssl all             teleport        all             cert clientcert=verify-full

    # Allow access_graph_user with password over SSL from pod CIDR
    # Access Graph connects via URI secret (password auth), not client certs
    hostssl access_graph_db access_graph_user 192.168.0.0/16  scram-sha-256

    # Deny all other connections by default
    host    all             all             all             reject
