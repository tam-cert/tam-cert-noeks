apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Wait for certs to exist before starting
      initContainers:
        - name: wait-for-certs
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              until kubectl get secret postgres-certs -n postgres >/dev/null 2>&1; do
                echo "Waiting for postgres-certs secret..."
                sleep 5
              done
              echo "Certs ready"
      containers:
        - name: postgres
          image: ateleport/test:postgres-wal2json-17-1
          ports:
            - containerPort: 5432
          command: ["postgres"]
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: certs
              mountPath: /certs
              readOnly: true
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: pg-hba-config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: certs
          secret:
            secretName: postgres-certs
            defaultMode: 0600
        - name: postgres-config
          configMap:
            name: postgres-config
        - name: pg-hba-config
          configMap:
            name: pg-hba-config
        - name: init-sql
          configMap:
            name: init-sql
