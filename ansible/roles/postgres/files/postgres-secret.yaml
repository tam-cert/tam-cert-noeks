# postgres-secret.yaml
# Admin credentials for the postgres superuser — used only for bootstrap
# (the postgres process itself). The teleport user authenticates via
# client certificate, not password.
#
# IMPORTANT: Apply this manually or via sealed-secrets before deploying.
# Do NOT commit real values — replace the placeholders below.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_WITH_STRONG_PASSWORD
