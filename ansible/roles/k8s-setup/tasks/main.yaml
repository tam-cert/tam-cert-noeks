---
- name: Kill any running apt/dpkg processes (they will have been spawned by cloud-init timers)
  ansible.builtin.shell:
    cmd: |
      systemctl stop unattended-upgrades apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
      systemctl kill --kill-who=all apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
      while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
                  /var/lib/dpkg/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
        echo "Waiting for apt lock to clear..."
        sleep 5
      done
      dpkg --configure -a 2>/dev/null || true
    executable: /bin/bash
  become: true
  changed_when: false

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    lock_timeout: 120

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key (for containerd.io 2.x)
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg

- name: Set Docker keyring permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"

- name: Add Docker apt repository (for containerd.io 2.x)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable"
    filename: docker
    state: present

- name: Remove default containerd package if present
  ansible.builtin.apt:
    name: containerd
    state: absent
    lock_timeout: 120

- name: Install containerd.io 2.x from Docker repo
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: true
    lock_timeout: 120

- name: Remove default containerd config if present
  ansible.builtin.file:
    path: /etc/containerd/config.toml
    state: absent

- name: Configure containerd default config
  ansible.builtin.shell:
    cmd: containerd config default > /etc/containerd/config.toml
  changed_when: true

- name: Enable SystemdCgroup in containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Ensure CRI plugin is not disabled
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '.*disabled_plugins.*cri.*'
    state: absent

- name: Enable and restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true
    daemon_reload: true

- name: Wait for containerd CRI socket to be ready
  ansible.builtin.wait_for:
    path: /run/containerd/containerd.sock
    state: present
    timeout: 30

- name: Add Kubernetes GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/Release.key
      | gpg --dearmor -o {{ k8s_keyring }}
    creates: "{{ k8s_keyring }}"

- name: Set keyring permissions
  ansible.builtin.file:
    path: "{{ k8s_keyring }}"
    mode: "0644"

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ k8s_keyring }}] https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/ /"
    filename: kubernetes
    state: present

- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true
    lock_timeout: 120

- name: Hold Kubernetes packages at current version
  ansible.builtin.shell:
    cmd: apt-mark hold kubelet kubeadm kubectl
    executable: /bin/bash
  become: true
  changed_when: true

- name: Enable kubelet (kubeadm will start it)
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: stopped

- name: Disable swap (runtime)
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap (persistent)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)

    replace: '# \1'

- name: Load required kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Set sysctl params for Kubernetes networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward,                 value: "1" }
