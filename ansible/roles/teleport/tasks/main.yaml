---
- name: Install Helm
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    creates: /usr/local/bin/helm

- name: Add Teleport Helm repo
  ansible.builtin.command:
    cmd: helm repo add teleport https://charts.releases.teleport.dev
  changed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Create teleport namespace
  ansible.builtin.command:
    cmd: kubectl create namespace teleport
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Create PostgreSQL credentials secret
  ansible.builtin.command:
    cmd: >
      kubectl create secret generic teleport-pg-credentials
      --namespace teleport
      --from-literal=conn_string="postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_backend?sslmode=require&pool_max_conns=20"
      --from-literal=audit_uri="postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_audit?sslmode=require"
  register: secret_result
  failed_when: secret_result.rc != 0 and 'already exists' not in secret_result.stderr
  changed_when: secret_result.rc == 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Install PostgreSQL client
  ansible.builtin.apt:
    name: postgresql-client
    state: present
    update_cache: true

- name: Create teleport_audit database in RDS
  ansible.builtin.command:
    cmd: >
      psql "postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_backend?sslmode=require"
      -c "CREATE DATABASE teleport_audit;"
  register: db_result
  failed_when: db_result.rc != 0 and 'already exists' not in db_result.stderr
  changed_when: db_result.rc == 0

- name: Copy Teleport values file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../helm/teleport-values.yaml"
    dest: /home/ubuntu/teleport-values.yaml
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Install Teleport via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install teleport teleport/teleport-cluster
      --namespace teleport
      --version 18.7.1
      --values /home/ubuntu/teleport-values.yaml
      --set auth.teleportConfig.teleport.storage.conn_string="postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_backend?sslmode=require&pool_max_conns=20"
      --set "auth.teleportConfig.teleport.storage.audit_events_uri[0]=postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_audit?sslmode=require"
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for Teleport pods to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport -n teleport --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Get Teleport pod status
  ansible.builtin.command:
    cmd: kubectl get pods -n teleport
  register: teleport_pods
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Print Teleport pod status
  ansible.builtin.debug:
    msg: "{{ teleport_pods.stdout_lines }}"
