---
- name: Source environment vars file
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
  register: env_vars
  changed_when: false

- name: Set RDS address fact from env file
  ansible.builtin.set_fact:
    rds_address: "{{ env_vars.stdout | regex_search('RDS_ADDRESS=(.+)', '\\1') | first }}"

- name: Set DB secret name fact from env file
  ansible.builtin.set_fact:
    db_secret_name: "{{ env_vars.stdout | regex_search('DB_SECRET_NAME=(.+)', '\\1') | first }}"

- name: Fetch DB password from AWS Secrets Manager
  ansible.builtin.command:
    cmd: aws secretsmanager get-secret-value --secret-id {{ db_secret_name }} --region us-west-2 --query SecretString --output text
  register: db_secret_result
  changed_when: false

- name: Set DB password fact
  ansible.builtin.set_fact:
    db_password: "{{ db_secret_result.stdout }}"

- name: Install Helm
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    creates: /usr/local/bin/helm

- name: Add Teleport Helm repo
  ansible.builtin.command:
    cmd: helm repo add teleport https://charts.releases.teleport.dev
  changed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Create teleport namespace
  ansible.builtin.command:
    cmd: kubectl create namespace teleport
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Create PostgreSQL credentials secret
  ansible.builtin.shell:
    cmd: |
      kubectl create secret generic teleport-pg-credentials \
        --namespace teleport \
        --from-literal=conn_string="postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_backend?sslmode=require&pool_max_conns=20" \
        --from-literal=audit_uri="postgresql://teleport:{{ db_password }}@{{ rds_address }}:5432/teleport_audit?sslmode=require" \
        --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Template Teleport values file with RDS connection strings
  ansible.builtin.template:
    src: teleport-values.yaml.j2
    dest: /home/ubuntu/teleport-values.yaml
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Install Teleport via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install teleport teleport/teleport-cluster
      --namespace teleport
      --version 18.7.1
      --values /home/ubuntu/teleport-values.yaml
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for Teleport auth rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  ignore_errors: true

- name: Get Teleport pod status
  ansible.builtin.command:
    cmd: kubectl get pods -n teleport
  register: teleport_pods
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Print Teleport pod status
  ansible.builtin.debug:
    msg: "{{ teleport_pods.stdout_lines }}"
