---
# argocd/tasks/main.yaml
#
# Deploys Argo CD to the argocd namespace via Helm and registers it as a
# Teleport app resource so it's accessible via the Teleport proxy (browser SSO).
#
# Sequence:
#   1. Add argo Helm repo
#   2. Install argo-cd Helm chart (NodePort 32080, --insecure server)
#   3. Wait for rollout
#   4. Patch argocd-server Service to pin NodePort to 32080
#   5. Retrieve initial admin password
#   6. Register ArgoCD as a Teleport app via ConfigMap mount + tctl create

# ── Helm repo ─────────────────────────────────────────────────────────────────

- name: Add Argo Helm repo
  ansible.builtin.command:
    cmd: helm repo add argo https://argoproj.github.io/argo-helm
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

# ── Namespace ─────────────────────────────────────────────────────────────────

- name: Create argocd namespace
  ansible.builtin.command:
    cmd: kubectl create namespace argocd
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

# ── Helm install ──────────────────────────────────────────────────────────────
# Run argocd-server with --insecure so it serves plain HTTP internally.
# TLS termination is handled by the Teleport proxy when accessed via app access.
# The service is exposed as NodePort; we pin the port with a patch after install.

- name: Install argo-cd Helm chart
  ansible.builtin.command:
    cmd: >
      helm upgrade --install argocd argo/argo-cd
      --namespace argocd
      --set server.extraArgs={--insecure}
      --set server.service.type=NodePort
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for argocd-server rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

# ── Pin NodePort to 32080 ─────────────────────────────────────────────────────
# Helm does not support pinning a specific nodePort value; we patch it after
# install. Port 32080 is used for the ArgoCD HTTP endpoint.

- name: Get HTTP port index in argocd-server service
  ansible.builtin.shell:
    cmd: |
      kubectl get svc argocd-server -n argocd -o json | \
        python3 -c "
      import json, sys
      d = json.load(sys.stdin)
      for i, p in enumerate(d['spec']['ports']):
          if p['name'] == 'http':
              print(i)
              break
      "
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: http_port_index
  changed_when: false

- name: Pin argocd-server HTTP NodePort to 32080
  ansible.builtin.shell:
    cmd: |
      kubectl patch svc argocd-server -n argocd \
        --type='json' \
        -p="[{\"op\":\"replace\",\"path\":\"/spec/ports/{{ http_port_index.stdout }}/nodePort\",\"value\":32080}]"
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Verify NodePort is 32080
  ansible.builtin.command:
    cmd: >
      kubectl get svc argocd-server -n argocd
      -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_nodeport
  changed_when: false

- name: Print ArgoCD NodePort
  ansible.builtin.debug:
    msg: "ArgoCD HTTP NodePort: {{ argocd_nodeport.stdout }} (expected: 32080)"


# ── Initial admin password ────────────────────────────────────────────────────

- name: Retrieve ArgoCD initial admin password
  ansible.builtin.shell:
    cmd: |
      kubectl get secret argocd-initial-admin-secret \
        -n argocd \
        -o jsonpath='{.data.password}' | base64 -d
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_admin_password
  changed_when: false

- name: Print ArgoCD initial admin password
  ansible.builtin.debug:
    msg: "ArgoCD initial admin password: {{ argocd_admin_password.stdout }}"

# ── Register ArgoCD as a Teleport app ─────────────────────────────────────────
# Uses the ConfigMap mount pattern (same as teleport-node role) to avoid
# kubectl exec -i stdin truncation with distroless containers.
# The app URI points to the in-cluster argocd-server service (HTTP, --insecure).

- name: Get Teleport auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

- name: Render ArgoCD Teleport app manifest
  ansible.builtin.template:
    src: teleport-app-argocd.yaml.j2
    dest: /tmp/teleport-app-argocd.yaml
    mode: "0600"


- name: Create bootstrap ConfigMap with ArgoCD app manifest
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap argocd-teleport-bootstrap \
        -n teleport \
        --from-file=teleport-app-argocd.yaml=/tmp/teleport-app-argocd.yaml \
        --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Patch auth deployment to mount ArgoCD app bootstrap ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl patch deployment teleport-auth -n teleport --type=json -p='[
        {
          "op": "add",
          "path": "/spec/template/spec/volumes/-",
          "value": {
            "name": "argocd-bootstrap",
            "configMap": {"name": "argocd-teleport-bootstrap"}
          }
        },
        {
          "op": "add",
          "path": "/spec/template/spec/containers/0/volumeMounts/-",
          "value": {
            "name": "argocd-bootstrap",
            "mountPath": "/tmp/argocd-bootstrap",
            "readOnly": true
          }
        }
      ]'
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for auth pod rollout after patch
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Get new auth pod name after rollout
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_new
  changed_when: false


- name: Register ArgoCD app in Teleport via tctl
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_new.stdout }} --
      tctl create -f /tmp/argocd-bootstrap/teleport-app-argocd.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: tctl_result
  failed_when:
    - tctl_result.rc != 0
    - '"already exists" not in tctl_result.stderr'
  changed_when: tctl_result.rc == 0

# ── Cleanup ───────────────────────────────────────────────────────────────────

- name: Remove bootstrap volumeMount from auth deployment
  ansible.builtin.shell:
    cmd: |
      IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
        python3 -c "
      import json, sys
      d = json.load(sys.stdin)
      mounts = d['spec']['template']['spec']['containers'][0].get('volumeMounts', [])
      for i, m in enumerate(mounts):
          if m['name'] == 'argocd-bootstrap':
              print(i); break
      ")
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${IDX}\"}]"
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Remove bootstrap volume from auth deployment
  ansible.builtin.shell:
    cmd: |
      IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
        python3 -c "
      import json, sys
      d = json.load(sys.stdin)
      vols = d['spec']['template']['spec'].get('volumes', [])
      for i, v in enumerate(vols):
          if v['name'] == 'argocd-bootstrap':
              print(i); break
      ")
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${IDX}\"}]"
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for auth pod rollout after cleanup
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Delete bootstrap ConfigMap
  ansible.builtin.command:
    cmd: kubectl delete configmap argocd-teleport-bootstrap -n teleport
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: cm_delete
  failed_when: cm_delete.rc != 0 and 'not found' not in cm_delete.stderr
  changed_when: cm_delete.rc == 0

- name: Remove rendered app manifest from master
  ansible.builtin.file:
    path: /tmp/teleport-app-argocd.yaml
    state: absent

# ── Pre-create teleport-rbac-files ConfigMap (roles only, no SAML) ────────────
# The SAML connector references custom roles (base, okta_base) that don't exist
# until ArgoCD's PostSync Job runs. To avoid a chicken-and-egg rejection from
# tctl, the SAML connector is NOT included here. It is applied separately AFTER
# ArgoCD has successfully synced all roles (see post-ArgoCD SAML update below).

- name: Create empty teleport-rbac-files ConfigMap placeholder
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap teleport-rbac-files -n teleport \
        --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

# ── Deploy teleport-rbac ArgoCD Application ───────────────────────────────────
# Applied AFTER the ConfigMap exists so ArgoCD can adopt it on first sync
# and the PostSync Job immediately has the saml-okta.yaml entry available.

- name: Apply teleport-rbac ArgoCD Application
  ansible.builtin.command:
    cmd: kubectl apply -f /home/ubuntu/ansible/argocd/apps/teleport-rbac-app.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

# ── Exclude Teleport-native kinds from ArgoCD resource tracking ───────────────
# ArgoCD tries to look up live state for every resource kind it discovers.
# Teleport-native kinds (role, login_rule, etc.) have no K8s API group,
# causing a "groupVersion shouldn't be empty" ComparisonError that blocks
# the PostSync Job. Excluding them tells ArgoCD to ignore them entirely.

- name: Patch argocd-cm to exclude Teleport-native resource kinds
  ansible.builtin.shell:
    cmd: |
      kubectl patch configmap argocd-cm -n argocd --type=merge -p '{
        "data": {
          "resource.exclusions": "- apiGroups:\n  - \"\"\n  kinds:\n  - role\n  - login_rule\n  - cluster_auth_preference\n  - saml\n  - kube_cluster\n  clusters:\n  - \"*\"\n"
        }
      }'
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Restart argocd-application-controller to pick up exclusions
  ansible.builtin.command:
    cmd: kubectl rollout restart statefulset/argocd-application-controller -n argocd
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for argocd-application-controller rollout
  ansible.builtin.command:
    cmd: kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=120s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Wait for teleport-rbac Application to sync
  ansible.builtin.command:
    cmd: >
      kubectl wait -n argocd application/teleport-rbac
      --for=jsonpath='{.status.sync.status}'=Synced
      --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  failed_when: false
  register: rbac_sync

- name: Print teleport-rbac sync status
  ansible.builtin.debug:
    msg: "{{ rbac_sync.stdout | default('Sync status check complete') }}"

# ── Update SAML connector with full role mappings ─────────────────────────────
# Now that ArgoCD has applied all custom roles (base, okta_base, etc.), we can
# safely update the SAML connector to include the full attributes_to_roles
# mapping. This replaces the bootstrap connector created in teleport-sso step 8.

- name: Source teleport-env to get Okta variables
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
    executable: /bin/bash
  register: teleport_env_vars
  changed_when: false

- name: Set Okta facts from env file
  ansible.builtin.set_fact:
    okta_metadata_url:  "{{ teleport_env_vars.stdout | regex_search('OKTA_METADATA_URL=(.+)', '\\1') | first }}"
    okta_groups_editor: "{{ teleport_env_vars.stdout | regex_search('OKTA_GROUPS_EDITOR=(.+)', '\\1') | first }}"
    okta_groups_access: "{{ teleport_env_vars.stdout | regex_search('OKTA_GROUPS_ACCESS=(.+)', '\\1') | first }}"

- name: Get auth pod name for SAML update
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_saml
  changed_when: false

- name: Write full SAML connector to temp file
  ansible.builtin.copy:
    dest: /tmp/saml-okta-full.yaml
    mode: "0600"
    content: |
      kind: saml
      version: v2
      metadata:
        name: okta
      spec:
        display: "Okta"
        acs: "https://grant-tam-teleport.gvteleport.com/v1/webapi/saml/acs/okta"
        entity_descriptor_url: "{{ okta_metadata_url }}"
        attributes_to_roles:
          - name: "groups"
            value: "*"
            roles:
              - base
          - name: "groups"
            value: "{{ okta_groups_editor }}"
            roles:
              - editor
              - access
              - auditor
              - okta_reviewer
              - mcp-ollama-tools
          - name: "groups"
            value: "{{ okta_groups_access }}"
            roles:
              - okta_base

- name: Apply full SAML connector via ConfigMap mount
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap saml-full-patch -n teleport \
        --from-file=saml-okta-full.yaml=/tmp/saml-okta-full.yaml \
        --dry-run=client -o yaml | kubectl apply -f -
      kubectl patch deployment teleport-auth -n teleport --type=json -p='[
        {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"saml-full","configMap":{"name":"saml-full-patch"}}},
        {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"saml-full","mountPath":"/tmp/saml-full","readOnly":true}}
      ]'
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
      AUTH_POD=$(kubectl get pod -n teleport -l app.kubernetes.io/component=auth -o jsonpath='{.items[0].metadata.name}')
      kubectl exec -n teleport $AUTH_POD -- tctl create -f /tmp/saml-full/saml-okta-full.yaml
      MOUNT_IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
        python3 -c "import json,sys; d=json.load(sys.stdin); mounts=d['spec']['template']['spec']['containers'][0].get('volumeMounts',[]); [print(i) for i,m in enumerate(mounts) if m['name']=='saml-full']")
      VOL_IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
        python3 -c "import json,sys; d=json.load(sys.stdin); vols=d['spec']['template']['spec'].get('volumes',[]); [print(i) for i,v in enumerate(vols) if v['name']=='saml-full']")
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${MOUNT_IDX}\"},{\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${VOL_IDX}\"}]"
      kubectl delete configmap saml-full-patch -n teleport
      rm /tmp/saml-okta-full.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Verify full SAML connector applied
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_saml.stdout }} -- tctl get saml/okta
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: saml_verify
  changed_when: false

- name: Print SAML connector
  ansible.builtin.debug:
    msg: "{{ saml_verify.stdout_lines }}"

# ── Apply AI inference secret ─────────────────────────────────────────────────
# The inference_secret contains the Skynet API key which cannot be committed
# to the repo. Applied here (after ArgoCD has applied the inference_model which
# references it) using the SKYNET_API_KEY value from the environment.

- name: Source teleport-env for skynet API key
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
    executable: /bin/bash
  register: teleport_env_skynet
  changed_when: false

- name: Set skynet API key fact
  ansible.builtin.set_fact:
    skynet_api_key: "{{ teleport_env_skynet.stdout | regex_search('SKYNET_API_KEY=(.+)', '\\1') | first }}"

- name: Apply inference_secret via ConfigMap mount
  ansible.builtin.shell:
    cmd: |
      cat > /tmp/inference-secret.yaml << EOF
      kind: inference_secret
      version: v1
      metadata:
        name: grant-skynet-secret
      spec:
        value: "{{ skynet_api_key }}"
      EOF
      kubectl create configmap inference-secret-patch -n teleport \
        --from-file=inference-secret.yaml=/tmp/inference-secret.yaml \
        --dry-run=client -o yaml | kubectl apply -f -
      kubectl patch deployment teleport-auth -n teleport --type=json -p='[
        {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"inf-secret","configMap":{"name":"inference-secret-patch"}}},
        {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"inf-secret","mountPath":"/tmp/inf-secret","readOnly":true}}
      ]'
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
      AUTH_POD=$(kubectl get pod -n teleport -l app.kubernetes.io/component=auth -o jsonpath='{.items[0].metadata.name}')
      kubectl exec -n teleport $AUTH_POD -- tctl create -f /tmp/inf-secret/inference-secret.yaml
      MOUNT_IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
        python3 -c "import json,sys; d=json.load(sys.stdin); mounts=d['spec']['template']['spec']['containers'][0].get('volumeMounts',[]); idxs=[str(i) for i,m in enumerate(mounts) if m['name']=='inf-secret']; print(idxs[0] if idxs else '')")
      VOL_IDX=$(kubectl get deployment teleport-auth -n teleport -o json | \
        python3 -c "import json,sys; d=json.load(sys.stdin); vols=d['spec']['template']['spec'].get('volumes',[]); idxs=[str(i) for i,v in enumerate(vols) if v['name']=='inf-secret']; print(idxs[0] if idxs else '')")
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${MOUNT_IDX}\"},{\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${VOL_IDX}\"}]"
      kubectl delete configmap inference-secret-patch -n teleport
      rm /tmp/inference-secret.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Verify inference secret applied
  ansible.builtin.shell:
    cmd: |
      AUTH_POD=$(kubectl get pod -n teleport -l app.kubernetes.io/component=auth -o jsonpath='{.items[0].metadata.name}')
      kubectl exec -n teleport $AUTH_POD -- tctl get inference_secret/grant-skynet-secret
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: inf_secret_verify
  changed_when: false

- name: Print inference secret status
  ansible.builtin.debug:
    msg: "{{ inf_secret_verify.stdout_lines }}"

# ── Apply MCP static join token ───────────────────────────────────────────────
# The MCP server is outside the cluster so it joins via a static token.
# Token value sourced from MCP_TOKEN_VALUE in .teleport-env (GH secret).
# TTL=0 means the token never expires (permanent static token).

- name: Set MCP token value fact
  ansible.builtin.set_fact:
    mcp_token_value: "{{ teleport_env_skynet.stdout | regex_search('MCP_TOKEN_VALUE=(.+)', '\\1') | first }}"

- name: Apply MCP join token via tctl
  ansible.builtin.shell:
    cmd: |
      AUTH_POD=$(kubectl get pod -n teleport -l app.kubernetes.io/component=auth \
        -o jsonpath='{.items[0].metadata.name}')
      kubectl exec -n teleport $AUTH_POD -- \
        tctl tokens add --type=app,node --ttl=0 --value={{ mcp_token_value }}
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: mcp_token_result
  failed_when:
    - mcp_token_result.rc != 0
    - "'already exists' not in mcp_token_result.stderr"
  changed_when: mcp_token_result.rc == 0

- name: Print MCP token result
  ansible.builtin.debug:
    msg: "{{ mcp_token_result.stdout_lines | default(['Token already exists or created']) }}"

- name: Get final auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_final
  changed_when: false

- name: Verify ArgoCD app registered in Teleport
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_final.stdout }} --
      tctl get app/argocd
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: app_result
  changed_when: false

- name: Print ArgoCD app registration
  ansible.builtin.debug:
    msg: "{{ app_result.stdout_lines }}"

- name: Print ArgoCD pod status
  ansible.builtin.command:
    cmd: kubectl get pods -n argocd
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_pods
  changed_when: false

- name: Show ArgoCD pods
  ansible.builtin.debug:
    msg: "{{ argocd_pods.stdout_lines }}"
