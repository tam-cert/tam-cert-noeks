---
- name: Source environment vars file
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
    executable: /bin/bash
  register: env_vars
  changed_when: false

- name: Get Teleport OIDC role ARN from env file
  ansible.builtin.set_fact:
    teleport_oidc_role_arn: "{{ env_vars.stdout | regex_search('TELEPORT_OIDC_ROLE_ARN=(.+)', '\\1') | first | default('') }}"

- name: Wait for Teleport auth to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Get auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

- name: Create Teleport AWS OIDC integration via tctl
  ansible.builtin.shell:
    cmd: |
      printf 'kind: integration\nsub_kind: aws-oidc\nversion: v1\nmetadata:\n  name: grant-tam-teleport-integration\nspec:\n  aws_oidc:\n    role_arn: "%s"\n' \
        "{{ teleport_oidc_role_arn }}" | \
      kubectl exec -i -n teleport {{ auth_pod.stdout }} -- tctl create -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: tctl_result
  failed_when:
    - tctl_result.rc != 0
    - '"already exists" not in tctl_result.stderr'
  changed_when: tctl_result.rc == 0

- name: Verify integration was created
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod.stdout }}
      -- tctl get integration/grant-tam-teleport-integration
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  register: integration_result

- name: Print integration status
  ansible.builtin.debug:
    msg: "{{ integration_result.stdout_lines }}"
