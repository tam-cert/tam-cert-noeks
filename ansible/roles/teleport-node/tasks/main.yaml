---
# teleport-node/tasks/main.yaml
#
# Creates the AWS IAM join token in Teleport that allows ssh-node-1 to
# auto-enroll using the AWS IAM join method.
#
# The join token specifies which IAM role ARN is allowed to join —
# only instances running with the ssh-node IAM role can authenticate.
# No static token is stored anywhere; the node proves identity via
# a signed sts:GetCallerIdentity response.

- name: Get Teleport auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

- name: Get AWS account ID
  ansible.builtin.command:
    cmd: aws sts get-caller-identity --query Account --output text --region us-west-2
  register: aws_account_id
  changed_when: false

- name: Write IAM join token manifest to temp file
  ansible.builtin.copy:
    dest: /tmp/ssh-node-iam-token.yaml
    mode: "0600"
    content: |
      kind: token
      version: v2
      metadata:
        name: ssh-node-iam-token
        expires: "3000-01-01T00:00:00Z"
      spec:
        roles: [Node]
        join_method: iam
        iam:
          allow:
            - aws_account: "{{ aws_account_id.stdout }}"
              aws_arn: "arn:aws:sts::{{ aws_account_id.stdout }}:assumed-role/grant-tam-ssh-node-role/*"

- name: Create AWS IAM join token for ssh-node-1
  ansible.builtin.shell:
    cmd: |
      kubectl exec -i -n teleport {{ auth_pod.stdout }} -- tctl create -f - \
        < /tmp/ssh-node-iam-token.yaml
      rm -f /tmp/ssh-node-iam-token.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: token_result
  failed_when:
    - token_result.rc != 0
    - '"already exists" not in token_result.stderr'
  changed_when: token_result.rc == 0

- name: Verify IAM join token was created
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod.stdout }}
      -- tctl tokens ls
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: token_list
  changed_when: false

- name: Print token list
  ansible.builtin.debug:
    msg: "{{ token_list.stdout_lines }}"
