---
# teleport-sso/tasks/main.yaml
#
# Bootstrap-only: creates the Okta SAML connector so the cluster has a working
# SSO connector before the Machine ID GitHub Actions workflow takes over.
#
# What this role does NOT do (handled by GitHub Actions + Machine ID):
#   - Patching the connector with the base role wildcard mapping
#   - Setting cluster_auth_preference (auth type / default connector)
# Those are managed by .github/workflows/teleport-rbac.yml via tbot/tctl
# so that all auth config changes go through the same audited, secretless path.
# cluster_auth_preference initial state is also set via Helm values at boot.

- name: Get auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

# ─── Create initial Okta SAML connector ──────────────────────────────────────
# Creates a bootstrap connector with editor + access mappings using only
# built-in Teleport roles (no custom roles exist yet at this step).
# ArgoCD (step 11) overwrites this with the full connector including the
# base wildcard mapping once the base role has been created.

- name: Create initial Okta SAML connector
  ansible.builtin.shell:
    cmd: |
      printf 'kind: saml\nversion: v2\nmetadata:\n  name: okta\nspec:\n  display: "Okta"\n  acs: "https://grant-tam-teleport.gvteleport.com/v1/webapi/saml/acs/okta"\n  entity_descriptor_url: "%s"\n  attributes_to_roles:\n    - name: "groups"\n      value: "%s"\n      roles:\n        - editor\n        - access\n    - name: "groups"\n      value: "%s"\n      roles:\n        - access\n' \
        "{{ okta_metadata_url }}" \
        "{{ okta_groups_editor }}" \
        "{{ okta_groups_access }}" | \
      kubectl exec -i -n teleport {{ auth_pod.stdout }} -- tctl create -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: saml_result
  failed_when:
    - saml_result.rc != 0
    - '"already exists" not in saml_result.stderr'
  changed_when: saml_result.rc == 0

- name: Pause for SAML connector to persist
  ansible.builtin.pause:
    seconds: 5

- name: Verify SAML connector was created
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod.stdout }}
      -- tctl get saml/okta
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  register: saml_verify

- name: Print SAML connector status
  ansible.builtin.debug:
    msg: "{{ saml_verify.stdout_lines }}"

- name: Remind operator that auth preference and base role are set by Machine ID workflow
  ansible.builtin.debug:
    msg: >
      Initial Okta SAML connector created. cluster_auth_preference and the
      base role wildcard mapping are applied by the GitHub Actions
      teleport-rbac workflow using Machine ID. Run that workflow next.
