---
# teleport-sso/tasks/main.yaml
#
# Bootstrap-only: creates the Okta SAML connector so the cluster has a working
# SSO connector before the Machine ID GitHub Actions workflow takes over.
#
# What this role does NOT do (handled by GitHub Actions + Machine ID):
#   - Patching the connector with the base role wildcard mapping
#   - Setting cluster_auth_preference (auth type / default connector)
# Those are managed by .github/workflows/teleport-rbac.yml via tbot/tctl
# so that all auth config changes go through the same audited, secretless path.
# cluster_auth_preference initial state is also set via Helm values at boot.

- name: Get auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

# ─── Create initial Okta SAML connector ──────────────────────────────────────
# Creates a bootstrap connector with editor + access mappings using only
# built-in Teleport roles (no custom roles exist yet at this step).
# The argocd role (step 11) updates this connector after ArgoCD has applied
# all custom roles, adding the base wildcard and okta_base mappings.
#
# Uses ConfigMap mount pattern — kubectl exec -i stdin truncates on distroless.

- name: Write bootstrap SAML connector to temp file
  ansible.builtin.copy:
    dest: /tmp/saml-okta-bootstrap.yaml
    mode: "0600"
    content: |
      kind: saml
      version: v2
      metadata:
        name: okta
      spec:
        display: "Okta"
        acs: "https://grant-tam-teleport.gvteleport.com/v1/webapi/saml/acs/okta"
        entity_descriptor_url: "{{ okta_metadata_url }}"
        attributes_to_roles:
          - name: "groups"
            value: "{{ okta_groups_editor }}"
            roles:
              - editor
              - access
              - auditor
          - name: "groups"
            value: "{{ okta_groups_access }}"
            roles:
              - access

- name: Create bootstrap SAML ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap saml-bootstrap -n teleport \
        --from-file=saml-okta-bootstrap.yaml=/tmp/saml-okta-bootstrap.yaml \
        --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Patch auth deployment to mount SAML bootstrap ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl patch deployment teleport-auth -n teleport --type=json -p='[
        {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"saml-bootstrap","configMap":{"name":"saml-bootstrap"}}},
        {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"saml-bootstrap","mountPath":"/tmp/saml-bootstrap","readOnly":true}}
      ]'
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Get auth pod name after rollout
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_after
  changed_when: false

- name: Create initial Okta SAML connector via tctl
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_after.stdout }} --
      tctl create -f /tmp/saml-bootstrap/saml-okta-bootstrap.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: saml_result
  failed_when:
    - saml_result.rc != 0
    - '"already exists" not in saml_result.stderr'
  changed_when: saml_result.rc == 0

- name: Cleanup SAML bootstrap volume and ConfigMap
  ansible.builtin.shell:
    cmd: |
      VOL_IDX=$(kubectl get deployment teleport-auth -n teleport \
        -o jsonpath='{range .spec.template.spec.volumes[*]}{.name}{"\n"}{end}' | \
        awk '/^saml-bootstrap$/{print NR-1; exit}')
      MOUNT_IDX=$(kubectl get deployment teleport-auth -n teleport \
        -o jsonpath='{range .spec.template.spec.containers[0].volumeMounts[*]}{.name}{"\n"}{end}' | \
        awk '/^saml-bootstrap$/{print NR-1; exit}')
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${MOUNT_IDX}\"},{\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${VOL_IDX}\"}]"
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
      kubectl delete configmap saml-bootstrap -n teleport
      rm -f /tmp/saml-okta-bootstrap.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Get auth pod name after cleanup rollout
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_final
  changed_when: false

- name: Verify SAML connector was created
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_final.stdout }}
      -- tctl get saml/okta
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  register: saml_verify

- name: Print SAML connector status
  ansible.builtin.debug:
    msg: "{{ saml_verify.stdout_lines }}"

- name: Remind operator that full SAML mapping is applied by argocd role
  ansible.builtin.debug:
    msg: >
      Bootstrap Okta SAML connector created (built-in roles only).
      The argocd role (step 11) will update this connector with the full
      attributes_to_roles mapping including base and okta_base after
      ArgoCD has applied all custom roles.
